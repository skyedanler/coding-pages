<!DOCTYPE html>
<html>
    <head> 
        <link rel="stylesheet" href="../styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Eater&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@400;700&display=swap" rel="stylesheet">
    </head>
    <body class="halloween">
        <header>
            <div class="title-section">
                <img id="header-img1"> <!--TODO: get header images working for all nav-->
                <h1>Coding Is Fun!</h1>
                <img id="header-img2">
            </div>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="#">Codecademy</a></li>
                    <li><a href="#">NavSite</a></li>
                    <li><a href="#">NavSite</a></li>
                </ul>
            </nav>
        </header>
        <div class="rest-of-body">
            <div id="courses-completed">
                <h2>Codecademy Courses I've Completed:</h2>
                <ul id="codecademy"></ul>
                <script>
                    const printCodecademyList = (list) => {
                        listContainer = document.getElementById('codecademy');
                        let listhtml = ''
                        list.forEach(element => {
                            listhtml += `<li>${element}</li>`
                    });
                        listContainer.innerHTML = listhtml;
                    }

                    async function fetchCodecademyList() {
                        const response = await fetch('./codecademy.json');
                        const list = await response.json();
                        return list;
                    }

                    fetchCodecademyList().then(codecademy => printCodecademyList(codecademy));

                </script>
            </div>
            
        </div>
        <footer>
            <p id="copyright"></p>
        </footer>
        <script type="text/javascript" src="script.js"></script>
    </body>
</html>
